version: '3.8'

services:
  folder2podcast:
    build: .
    container_name: folder2podcast
    ports:
      - "3100:3100"
    volumes:
      - ./audio:/podcasts  # 挂载音频文件夹
    environment:
      - NODE_ENV=production
      - PORT=3100
      - AUDIO_DIR=/podcasts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3100/podcasts"]
      interval: 30s
      timeout: 10s
      retries: 3