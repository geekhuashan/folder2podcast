name: Docker Image CI/CD (V2 Stable - Next.js)

# 专门用于 main-v2 分支的生产版本发布（Next.js 全站架构）
# V2 开发版本见 docker-publish-dev-v2.yml

on:
  push:
    branches: [ "main-v2" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main-v2" ]
  workflow_dispatch:  # 允许手动触发

env:
  IMAGE_NAME: yaotutu/folder2podcast
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image (main-v2)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.IMAGE_NAME }}:main-v2
            ${{ env.IMAGE_NAME }}:latest-v2
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.description=Folder2Podcast V2 - Next.js Full Stack Application
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Image digest
        run: |
          echo "✅ Docker images built and pushed successfully!"
          echo "📦 Tags:"
          echo "  - ${{ env.IMAGE_NAME }}:main-v2"
          echo "  - ${{ env.IMAGE_NAME }}:latest-v2"
          echo ""
          echo "🚀 Architecture: Next.js Full Stack"
          echo "📝 Commit: ${{ github.sha }}"

      # 可选：发送通知（如果配置了 Bark）
      - name: Send Bark notification
        if: success()
        continue-on-error: true
        run: |
          TITLE=$(echo -n "Docker镜像构建成功 (Next.js v2 stable)" | jq -sRr @uri)
          BODY=$(echo -n "main-v2分支已成功构建并推送到DockerHub (Next.js架构)" | jq -sRr @uri)
          curl --location "https://api.day.app/${{ secrets.BARK_KEY }}/${TITLE}/${BODY}?url=https://hub.docker.com/r/${{ env.IMAGE_NAME }}"
